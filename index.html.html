  {cat:"roman",t:"Le Serment du Boli",a:"Lury NKOUESSOM",p:5000,d:"Dans la république corrompue du Wongo, les serments sur la Bible et la Constitution sont devenus une farce. Le nouveau Ministre de la Justice propose l'impensable : que les dirigeants jurent sur le Boli, un fétiche ancestral qui punit le mensonge du cœur. Thriller politico-mystique haletant."},
  {cat:"roman",t:"Les Héritiers du Soleil Noir",a:"Lury NKOUESSOM",p:5000,d:"Double épopée entre l'Afrique antique et 2035. Dans le royaume de Ta-Seti, le scribe Kemet fuit avec un savoir sacré. Au Katiaba contemporain, l'archéologue Aminata suit ses traces face à une multinationale prédatrice. Fresque monumentale sur la mémoire, la résistance et la renaissance africaine."},
  {cat:"roman",t:"Le Rêve Trahi d'Addis Abeba",a:"Lury NKOUESSOM",p:5000,d:"Addis-Abeba, mai 1963. L'Afrique tout entière rêve d'unité. Mais au sommet du Caire en 1964, les idéalistes perdent face aux pragmatiques : les frontières coloniales seront maintenues. Roman-fresque sur le moment où le continent a choisi la division. Et si l'histoire avait pris un autre chemin ?"},
  {cat:"roman",t:"L'Arbre sans Racines",a:"Lury NKOUESSOM",p:5000,d:"Dans la République fictive de Kémalie, un jeune professeur de droit découvre que la démocratie multipartite importée divise plus qu'elle ne rassemble. Inspiré par Simone Weil et l'arbre à palabres, il rédige un manifeste explosif. Roman politique sur l'Afrique en quête de son propre modèle."},
  {cat:"roman",t:"Ce Que Nous Ne Disons Pas",a:"Lury NKOUESSOM",p:5000,d:"Imany, cadre brillant tiraillé entre monogamie et héritage polygame. Malia, intellectuelle blessée qui se reconstruit par l'écriture. Un roman qui explore les silences qui détruisent les couples africains modernes, entre traditions héritées et désirs inavoués."},
  {cat:"roman",t:"Le Poids des Ombres",a:"Lury NKOUESSOM",p:5000,d:"Drissa, architecte célèbre de Bamako, Aïssata sa femme pharmacienne, Mariam l'artiste libre qui fait tout basculer. Quand l'infidélité éclate, chacun doit affronter ses propres ruines. Un roman à trois voix sur l'amour, la trahison et la reconstruction dans l'Afrique urbaine d'aujourd'hui."},
  {cat:"roman",t:"Les Femmes de l'Almamy",a:"Lury NKOUESSOM",p:5000,d:"Reines, stratèges et résistantes : les femmes qui ont façonné l'empire du Fouta-Djalon. Roman historique où le pouvoir au féminin s'exerce dans l'ombre des trônes et la lumière des sacrifices."},
  {cat:"roman",t:"Modibo Keita : le lion de Bamako",a:"Lury NKOUESSOM",p:5000,d:"Premier roman jamais consacré à Modibo Keïta. De l'enfant du Soudan français au Palais de Koulouba, du rêve fédéraliste à la cellule de Kidal : l'intimité d'un homme qui a porté le destin d'un peuple sur ses épaules. Volume 1 de la collection Mémoire des Pères."},
  {cat:"roman",t:"Kwame Nkrumah : l'exil du Titan",a:"Lury NKOUESSOM",p:5000,d:"Volume 2 de la collection Mémoire des Pères. De l'enfant de Nkroful au père du panafricanisme, puis la chute et l'exil : le récit intime d'un homme qui a osé rêver un continent entier, trahi par ceux qu'il voulait libérer."},
  {cat:"roman",t:"L'homme qui parlait au fleuve",s:"La tragédie de Patrice Lumumba",a:"Lury NKOUESSOM",p:5000,d:"Kinshasa, 1960. Un homme croit à l'indépendance, un fleuve charrie les promesses trahies. Roman inspiré du destin tragique de Patrice Lumumba, entre espoir fou et conspiration meurtrière."},
  {cat:"roman",t:"Les lignes de faille",a:"Lury NKOUESSOM",p:5000,d:"Samuel Diarra, redoutable avocat d'affaires à Paris, a tout sacrifié à sa réussite. Un appel de sa soeur Aminata le renvoie à un serment fait à leur père mourant : protéger la terre familiale. Entre deux mondes, il devra choisir qui il est vraiment."},
  {cat:"essai",t:"Afrique des Prophètes, Afrique des Profits",s:"Christianisme à Deux Visages",a:"Lury NKOUESSOM",p:3500,d:"Des megachurches climatisées aux camps de prière en brousse, l'auteur décortique l'industrie religieuse qui prospère sur la pauvreté africaine. Quand la foi devient business et que les pasteurs roulent en jet privé, qui protège les fidèles ?"},
  {cat:"essai",t:"Dieu ne Porte pas de Rolex",s:"Arnaques Spirituelles et Financières",a:"Lury NKOUESSOM",p:3500,d:"De son enfance dans la guerre civile au Liberia aux temples climatisés de Bamako, l'auteur raconte comment fausses promesses et arnaques spirituelles détruisent des vies. Un récit personnel, cash et salutaire."},
  {cat:"essai",t:"La Dot, l'Autel et le « Viens on Reste »",s:"Nouveaux Contrats du Mariage Africain",a:"Lury NKOUESSOM",p:3500,d:"De la dot symbolique de nos grands-parents aux listes interminables d'aujourd'hui, du mariage coutumier au «viens on reste» : comment naviguer entre traditions, pressions familiales et aspirations personnelles ? Le guide indispensable avant de dire oui."},
  {cat:"essai",t:"Monogame par Contrat, Polygame de Nature",a:"Lury NKOUESSOM",p:3500,d:"Monogame sur le papier, polygame dans le cœur. Enquête sur la fracture entre le contrat de mariage et la réalité des corps et des désirs dans les sociétés africaines contemporaines."},
  {cat:"essai",t:"L'Infidélité Expliquée aux Hommes Mariés",s:"(et à leurs Épouses)",a:"Lury NKOUESSOM",p:3500,d:"Amadou aime sa femme. Il aime aussi Fatou, son «deuxième bureau» depuis quatre ans. Il ne se voit ni menteur ni traître. À partir de cette scène banale dans des milliers de foyers africains, une analyse sans tabou de la polygynie clandestine et un manuel pour couples qui veulent se regarder en face."},
  {cat:"essai",t:"Mâles Dominants, Femmes en Compétition",a:"Lury NKOUESSOM",p:3500,d:"Toutes les gazelles pour quelques lions ? L'auteur, lui-même polygame, dissèque le grand casting impitoyable de l'amour africain : femmes en compétition pour les «mâles dominants», jeunes hommes frustrés et invisibles, et une monogamie imposée qui fabrique l'hypocrisie. Essai explosif et honnête."},
  {cat:"essai",t:"Polygamies d'Afrique",s:"Tabous, Réalités et Avenirs",a:"Lury NKOUESSOM",p:3500,d:"Ni plaidoyer pour le retour au passé, ni manifeste occidental anti-polygamie. L'auteur, juriste et polygame, ouvre la palabre : histoire, droit, économie, féminisme, tout est sur la table. Et si on assumait la polygamie au lieu de la pratiquer en cachette ? Le livre qui brise le tabou."},
  {cat:"essai",t:"Le Mariage, entre Intérêt et Sentiment",a:"Lury NKOUESSOM",p:3500,d:"Et si la crise du mariage venait du triomphe absolu de l'amour romantique ? Du mariage arrangé au mariage d'amour, puis au divorce de masse : une enquête qui déconstruit nos certitudes et propose un nouveau pacte conjugal, entre raison, sentiment et volonté."},
  {cat:"essai",t:"La Balance et le Cousin",s:"Le juge africain face aux siens",a:"Lury NKOUESSOM",p:3500,d:"L'indépendance de la justice menacée de toutes parts : pressions de l'exécutif, corruption privée, et liens du sang. À travers l'histoire du juge Bakary Koné, forcé de juger son propre cousin à Gao, cet essai-récit révèle comment famille, pouvoir et argent conspirent pour mettre le magistrat africain à genoux."},
  {cat:"essai",t:"Dieu n'est pas Africain",a:"Lury NKOUESSOM",p:3500,d:"Du Liberia en guerre au Sahel, l'itinéraire d'un juriste africain devenu athée. Un plaidoyer sans concession pour libérer le continent de l'aliénation religieuse, qu'elle soit importée ou endogène. «L'avenir de l'Afrique sera humaniste, ou il ne sera pas.»"},
  {cat:"essai",t:"Le procès de Dieu",a:"Lury NKOUESSOM",p:3500,d:"Il y a vingt ans, j'ai prêté serment de défendre la justice. Aujourd'hui, j'accuse celui qui prétend en être l'architecte. Du Kivu au Sahel, un avocat met Dieu en procès : pièces à conviction, contre-interrogatoire des textes sacrés, réquisitoire, verdict. Et une lettre à ses enfants en guise d'épilogue."},
  {cat:"essai",t:"L'enfer n'existe pas",s:"Plus grande escroquerie morale de l'histoire",a:"Lury NKOUESSOM",p:3500,d:"À sept ans, assis à l'école du dimanche, l'auteur découvre un feu qui ne s'éteint jamais. Cette cicatrice ne l'a plus quitté. Enquête historique, psychologique et philosophique sur la plus grande escroquerie morale de l'histoire : une idée fabriquée par les hommes pour briser les esprits humains."},
  {cat:"essai",t:"Le Dividende de la dignité",s:"Pour un Revenu Universel de Base",a:"Lury NKOUESSOM",p:3500,d:"Et si chaque Africain recevait un revenu de base ? Pas une aumône, mais un dividende de dignité. Essai-manifeste qui chiffre, argumente et imagine un continent libéré de la misère structurelle."},
  {cat:"essai",t:"L'Imposture du Quitte Ton Job",s:"Critique de la Religion du Succès",a:"Lury NKOUESSOM",p:3500,d:"«Quitte ton job, deviens ton propre patron !» Le nouvel évangile des influenceurs en baskets griffées. Pendant ce temps, 20 millions de jeunes Africains cherchent désespérément un emploi. Enquête lucide qui réhabilite le salariat et démonte l'imposture de la religion du succès individuel."},
  {cat:"essai",t:"Israël ou la Supercherie du Peuple Élu",a:"Lury NKOUESSOM",p:3500,d:"Un peuple élu par Dieu ? L'auteur, juriste et athée, démonte le récit biblique de l'élection, ses usages politiques contemporains et ses conséquences sur le droit international. Essai courageux et documenté."},
  {cat:"essai",t:"L'Imposture du Sauveur",s:"De la Rédemption à la Démission",a:"Lury NKOUESSOM",p:3500,d:"Du Christ à l'Homme Providentiel, la promesse est la même : un autre viendra nous sauver. Mais le Sauveur ne nous libère pas de nos problèmes, il nous libère de notre capacité à les résoudre. Essai philosophique et politique sur la servitude volontaire et l'urgence de devenir un peuple adulte."},
  {cat:"essai",t:"Petit traité sur la mort",s:"À l'usage des vivants",a:"Lury NKOUESSOM",p:3500,d:"Un dossier de succession au Liberia, une bataille d'héritiers pour des médailles sans valeur : c'est là que tout commence. En juriste et philosophe, l'auteur propose une méditation laïque sur la finitude. Comment faire la paix avec la mort pour enfin commencer à vivre véritablement."},
  {cat:"essai",t:"Les Soldats de Dieu",s:"Réquisitoire contre les milices de l'Invisible",a:"Lury NKOUESSOM",p:3500,d:"Cet ouvrage n'est pas un dialogue. C'est un réquisitoire. En juriste qui a vu la justice s'effondrer partout où la loi de Dieu était invoquée, l'auteur ouvre le procès des milices de l'Invisible : ceux qui, au nom d'un commandant fantôme, s'érigent en avocats, juges et bourreaux."},
  {cat:"essai",t:"Le Crépuscule de Dieu",a:"Lury NKOUESSOM",p:3500,d:"Et si Dieu était une hypothèse dont l'humanité n'avait plus besoin ? Depuis le Mali, un juriste devenu athée interroge la science, la morale et le sens de la vie sans recours au divin. Itinéraire intellectuel rare et courageux depuis le continent le plus croyant du monde."},
  {cat:"essai",t:"La Politique n'est pas un métier",a:"Lury NKOUESSOM",p:3500,d:"En vingt ans sur le terrain en Afrique, l'auteur a vu les meilleures lois se briser contre le mur des intérêts privés. Ce manifeste propose une révolution : rotation obligatoire, fin des privilèges, redevabilité totale. La politique comme service civique, pas comme carrière."},
  {cat:"essai",t:"Un homme, une femme, un mensonge",s:"La Bible et la polygamie",a:"Lury NKOUESSOM",p:3500,d:"Abraham était bigame. David avait huit épouses. Moïse était polygame. Alors d'où vient l'exigence monogame du christianisme ? En juriste et exégète, l'auteur rouvre le dossier biblique avec une rigueur implacable. Verdict : la monogamie n'est pas dans les Écritures. Elle est dans la traduction."},
  {cat:"essai",t:"Le Mariage qu'on nous a vendu",s:"Critique africaine du mariage d'amour",a:"Lury NKOUESSOM",p:3500,d:"Il est vingt heures à Bamako. La grand-mère ne comprend pas la série brésilienne. Sa petite-fille étudiante regarde avec des yeux brillants. Entre ces deux regards, toute l'histoire du mariage d'amour importé en Afrique. Un essai qui remonte aux origines de ce que l'on nous a vendu comme l'unique façon d'aimer."},
  {cat:"essai",t:"La trahison du panafricanisme",s:"De l'idéal fédéraliste à l'impasse",a:"Lury NKOUESSOM",p:5000,d:"De Soundiata à Nkrumah, de Sankara à l'UA : 400 pages, 399 notes de bas de page, et une question qui brûle. Pourquoi le rêve d'une Afrique unie a-t-il été trahi par ceux-là mêmes qui le portaient ? L'essai de référence sur l'impasse panafricaine contemporaine."},
  {cat:"essai",t:"Secrets de Pharmacienne",s:"Lancez votre empire de cosmétiques naturelles",a:"Dr Danielle NKOUESSOM",p:5000,d:"Karité, moringa, hibiscus : transformez les trésors de votre cuisine en entreprise rentable. Recettes professionnelles, calculs de rentabilité et stratégie marketing par une pharmacienne de Bamako. Le guide pratique pour gagner votre indépendance financière."},
  {cat:"jur",c:"03",t:"Guide Citoyen du Code Pénal",s:"La Loi c'est pas compliqué !",a:"JURITECH",p:2500,d:"Qu'est-ce qu'un vol aggravé ? Quelle peine pour un abus de confiance ? Le Code pénal 2024 expliqué sans jargon, en langage citoyen. Pour que la loi cesse d'être un mystère."},
  {cat:"jur",c:"03",t:"Guide Citoyen du CPP",s:"La Loi c'est pas compliqué !",a:"JURITECH",p:2500,d:"De la plainte au jugement : comment fonctionne réellement la machine pénale au Mali ? Garde à vue, instruction, procès, recours — tout ce que le citoyen doit savoir, sans jargon."},
  {cat:"jur",c:"03",t:"Guide Citoyen du Code de la Famille",s:"La Loi c'est pas compliqué !",a:"JURITECH",p:2500,d:"Mariage, divorce, filiation, héritage : vos droits familiaux enfin expliqués en langage clair. Le Code de la Famille malien accessible à tous, pas seulement aux avocats."},
  {cat:"jur",c:"03",t:"Guide Citoyen du droit du travail",s:"La Loi c'est pas compliqué !",a:"JURITECH",p:2500,d:"Mon patron peut-il me licencier sans motif ? Combien de jours de congé ai-je ? Contrat, salaire, licenciement : le droit du travail malien enfin à la portée de ceux qu'il protège."},
  {cat:"jur",c:"03",t:"Guide Citoyen du droit foncier",s:"La Loi c'est pas compliqué !",a:"JURITECH",p:2500,d:"Titre foncier, concession rurale, litiges de voisinage : la terre est au cœur de tous les conflits au Mali. Ce guide explique vos droits fonciers en langage simple."},
  {cat:"jur",c:"01",t:"Droit pénal général",a:"Pr Kissima GAKOU & Dr Lury NKOUESSOM",p:10000,d:"Théorie de l'infraction, responsabilité pénale, peines et mesures de sûreté selon la loi n°2024-027. Le manuel de référence pour étudiants et praticiens du droit pénal malien."},
  {cat:"jur",c:"01",t:"Droit pénal spécial",a:"Pr Kissima GAKOU & Dr Lury NKOUESSOM",p:10000,d:"De l'homicide au cyberharcèlement, du vol au terrorisme : chaque infraction du Code pénal 2024 analysée, élément par élément, avec ses peines et sa jurisprudence."},
  {cat:"jur",c:"01",t:"Manuel de procédure pénale",a:"Pr Kissima GAKOU & Dr Lury NKOUESSOM",p:10000,d:"Enquête préliminaire, instruction, jugement, voies de recours et exécution des peines : la procédure pénale malienne décryptée selon la loi n°2024-028."},
  {cat:"jur",c:"01",t:"Traité de droit constitutionnel malien",a:"Dr Souleymane DE & Dr Lury NKOUESSOM",p:10000,d:"De la Constitution de 1960 à la Transition : histoire constitutionnelle, institutions, droits fondamentaux et séparation des pouvoirs au Mali. L'ouvrage de référence."},
  {cat:"jur",c:"01",t:"Droit des Personnes et de la Famille",a:"Dr Aguissa Ag MOHAMED",p:10000,d:"Personnalité juridique, état civil, nom, domicile, capacité, protection des mineurs et des majeurs vulnérables : le droit des personnes au Mali, Vol. 1 de la collection Aguissa Ag MOHAMED."},
  {cat:"jur",c:"01",t:"Droit du mariage",a:"Dr Aguissa Ag MOHAMED",p:10000,d:"Conditions de fond et de forme du mariage, régimes matrimoniaux, divorce et droits successoraux : le droit de la famille au Mali, Vol. 2 de la collection Aguissa Ag MOHAMED."},
  {cat:"jur",c:"01",t:"Introduction générale au droit malien",a:"Protranslex Éditions",p:7500,d:"Qu'est-ce que le droit ? Comment s'organise la justice malienne ? Sources, hiérarchie des normes, droits subjectifs et système de la preuve : le socle pour tout étudiant en droit au Mali."},
  {cat:"jur",c:"02",t:"Guide comparatif CPP 2001-2024",a:"JURITECH",p:7500,d:"1 399 articles comparés un par un : CPP 2001 vs CPP 2024. Tableaux de concordance, 5 annexes, 25 fichiers. L'outil indispensable pour tout praticien en période de transition."},
  {cat:"jur",c:"02",t:"Guide des nouvelles incriminations",a:"Protranslex Éditions",p:5000,d:"Quelles infractions ont été créées ? Lesquelles supprimées ? Lesquelles modifiées ? Tout ce qui change avec le Code pénal 2024, classé et analysé pour les praticiens."},
  {cat:"jur",c:"02",t:"Guide des droits de la défense",a:"JURITECH",p:5000,d:"De la garde à vue à la cassation : les droits de la défense à chaque étape de la procédure pénale malienne selon le CPP 2024. Guide pratique pour avocats et justiciables."},
  {cat:"jur",c:"02",t:"Techniques spéciales d'enquête",a:"Protranslex Éditions",p:7500,d:"Infiltration, écoutes téléphoniques, surveillance électronique : le CPP 2024 introduit les techniques spéciales d'enquête au Mali. Cadre légal, garanties et limites."},
  {cat:"jur",c:"02",t:"Manuel du Parajuriste Communautaire",a:"JURITECH",p:5000,d:"13 chapitres pour transformer un citoyen engagé en parajuriste efficace. Accueil, écoute, orientation, médiation : le manuel de terrain pour rapprocher la justice des communautés."},
  {cat:"jur",c:"02",t:"Modules de formation du parajuriste",a:"JURITECH",p:5000,d:"14 modules de formation clé en main : droits fondamentaux, procédure pénale, droit foncier, VBG, médiation. Pour formateurs et organisations d'accès au droit."},
  {cat:"jur",c:"04",t:"Lexique de droit constitutionnel malien",a:"Dr Souleymane DE",p:5000,d:"De « Assemblée nationale » à « Vote de confiance » : chaque terme du droit constitutionnel malien défini, contextualisé et illustré. Outil de travail pour étudiants et journalistes."},
  {cat:"jur",c:"04",t:"Lexique de droit pénal malien",a:"Dr Lury NKOUESSOM",p:5000,d:"De « Abus de confiance » à « Vol aggravé » : le vocabulaire complet du droit pénal malien selon le Code 2024. Définitions précises, références textuelles, exemples."},
  {cat:"jur",c:"05",t:"La trahison du panafricanisme",a:"Dr Lury NKOUESSOM",p:7500,d:"Essai majeur croisant philosophie, histoire, droit et politique. De l'idéal fédéraliste de Nkrumah à l'impasse de l'Union Africaine, une autopsie sans concession du rêve panafricain et des pistes pour le refonder."},
  {cat:"jur",c:"05",t:"Pour la gratuité de la justice",a:"Dr Lury NKOUESSOM",p:5000,d:"En vingt ans dans les tribunaux d'Afrique, l'auteur a vu le même fleuve infranchissable : l'argent. Ce livre propose l'impensable : une justice entièrement gratuite, financée par l'État, avec des avocats publics pour tous. Pas une utopie, mais un plan concret, chiffré et applicable."},
  {cat:"jur",c:"05",t:"L'accès à la justice au Mali",s:"Mimétisme juridique et hybridation",a:"Protranslex Éditions",p:7500,d:"La justice malienne est-elle accessible ? Quels obstacles empêchent les citoyens d'y recourir ? Essai doctrinal qui propose de dépasser le modèle importé pour un système adapté aux réalités du pays."},
  {cat:"jur",c:"05",t:"Responsabilité pénale des personnes morales",a:"Protranslex Éditions",p:5000,d:"Le Code pénal 2024 introduit la responsabilité pénale des personnes morales au Mali. Analyse doctrinale du nouveau régime : conditions, peines, implications pour les entreprises."},
  {cat:"jur",c:"05",t:"Outils juridiques contre les VBG",a:"Protranslex Éditions",p:5000,d:"Harcèlement, viol conjugal, mariage forcé : le Code pénal 2024 renforce l'arsenal juridique contre les VBG au Mali. Analyse des nouveaux outils et stratégies de mise en œuvre."},
  {cat:"jur",c:"05",t:"La Traite des Personnes à l'Ère Numérique",a:"Protranslex Éditions",p:7500,d:"Recrutement en ligne, exploitation via réseaux sociaux, traite transfrontalière numérique : les nouvelles formes de traite des personnes au Mali et les réponses juridiques adaptées."},
  {cat:"jur",c:"06",t:"Traité de cybercriminalité",a:"Protranslex Éditions",p:10000,d:"Cybercriminalité, preuve électronique, coopération judiciaire internationale : traité complet sur le droit pénal du numérique dans l'espace OHADA et au Mali."},
  {cat:"jur",c:"04",t:"Vade-mecum de la traduction des contrats OHADA",s:"Guide bilingue français-anglais",a:"Dr Lury NKOUESSOM",p:7500,d:"Traduire un contrat, c'est faire dialoguer deux systèmes juridiques. Ce guide pratique, truffé d'exemples bilingues, de tableaux comparatifs et d'exercices corrigés, est l'outil de référence pour tout juriste ou traducteur travaillant à l'interface entre droit OHADA et Common Law."},
  {cat:"jur",c:"06",t:"De l'OHADA à la Common Law",s:"Maîtriser l'anglais juridique en Afrique",a:"Dr Lury NKOUESSOM",p:10000,d:"Le guide complet du juriste francophone qui doit négocier, plaider ou arbitrer en anglais. Vocabulaire, contrats, procédure de common law et exercices pratiques. Indispensable dans un espace ouest-africain où OHADA et common law se croisent chaque jour."},
  {cat:"jur",c:"07",t:"Exercices de procédure pénale",a:"Pr Kissima GAKOU & Dr Lury NKOUESSOM",p:5000,d:"Cas pratiques, commentaires d'arrêts, dissertations juridiques : exercices corrigés et méthodologie détaillée pour réussir en procédure pénale malienne."},
  {cat:"jur",c:"07",t:"30 Maximes Juridiques Expliquées à ma Fille",a:"Dr Lury NKOUESSOM",p:3500,d:"Dura lex, sed lex. Pacta sunt servanda. In dubio pro reo. Un père juriste écrit à sa fille pour lui transmettre les 30 maximes qui fondent la justice depuis Rome. Chaque adage devient une leçon de vie, entre droit, philosophie et amour paternel."},
  {cat:"jur",c:"07",t:"Fiches pénales par infraction",a:"Protranslex Éditions",p:5000,d:"Une fiche par infraction : éléments constitutifs, peines encourues, circonstances aggravantes, jurisprudence. L'outil de révision et de pratique indispensable du pénaliste."},
];

const CM={roman:{bg:"linear-gradient(145deg,#8B1A1A,#5a1111)",label:"Roman",accent:"#e8a060"},essai:{bg:"linear-gradient(145deg,#D4862A,#a06318)",label:"Essai",accent:"#ffe0b0"},jur:{bg:"linear-gradient(145deg,#1B2A4A,#0f1a30)",label:"Juridique",accent:"#C8A45C"}};

function Cover({book}){
